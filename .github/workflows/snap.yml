name: Build and Publish Snap

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Install all dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc gettext make meson ninja-build \
            python3 python3-gi python3-gi-cairo \
            libadwaita-1-dev libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            gir1.2-gtk-4.0 gir1.2-adw-1 \
            gir1.2-webkit2-6.0 \
            libwebkitgtk-6.0-0 libadwaita-1-0

      - name: Build Snap
        run: |
          sudo --preserve-env=HOME,PATH,SNAPCRAFT_BUILD_ENVIRONMENT \
          SNAPCRAFT_BUILD_ENVIRONMENT=host \
          snapcraft --destructive-mode

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: secret-knowledge-snap
          path: '*.snap'

  publish:
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download snap
        uses: actions/download-artifact@v4
        with:
          name: secret-knowledge-snap

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Publish to Snap Store
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: snapcraft upload *.snap --release=stable
