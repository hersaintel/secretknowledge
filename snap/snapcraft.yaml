name: secret-knowledge
base: core24
version: '2.0.1'
summary: Offline browser for 1,657 security tools and resources
description: |
  The Book of Secret Knowledge is a free offline Linux desktop app that puts
  1,657 security tools and resources into one clean, searchable interface.
  Built by Hersa, a cyber intelligence analyst. Covers pentest frameworks,
  OSINT, AI security, cryptography, cloud security and more with full
  embedded documentation, no internet required.
  Disclaimer: All tools listed remain the property of their respective authors.
  Contact: @hersaintel (Instagram) · @ers49 (Discord)

grade: stable
confinement: strict

apps:
  secret-knowledge:
    command: bin/secret-knowledge
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - home
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
    environment:
      SECRET_KNOWLEDGE_DATA: $SNAP/share/secret-knowledge/data

parts:
  secret-knowledge:
    plugin: meson
    source: .
    meson-parameters:
      - --prefix=/usr
    override-build: |
      craftctl default
      mkdir -p $CRAFT_PART_INSTALL/share/secret-knowledge/data
      cp $CRAFT_PART_SRC/data/secret-knowledge-v2.html \
         $CRAFT_PART_INSTALL/share/secret-knowledge/data/
    build-packages:
      - python3
      - python3-gi
      - python3-gi-cairo
      - libgtk-4-dev
      - libadwaita-1-dev
      - libwebkitgtk-6.0-dev
      - meson
      - ninja-build
      - gettext
    stage-packages:
      - python3
      - python3-gi
      - python3-gi-cairo
      - gir1.2-gtk-4.0
      - gir1.2-adw-1
      - gir1.2-webkit-6.0
      - libadwaita-1-0

  launcher:
    plugin: dump
    source: snap/local/
    organize:
      secret-knowledge.sh: bin/secret-knowledge